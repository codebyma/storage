<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
    <title>경조사 관리</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
            background: #f5f5f5;
            color: #333;
             /* font-family: "Pretendard Variable",
                "Pretendard",
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                Roboto,
                "Helvetica Neue",
                "Apple SD Gothic Neo",
                "Noto Sans KR",
                sans-serif; */
            font-family:
		-apple-system,
		BlinkMacSystemFont,
		"SF Pro Display",
		"SF Pro Text",
		sans-serif;
        }

        h1 {
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            margin-bottom: 20px;
        }

        .tab {
            border: none;
            background: #e5e5e5;
            padding: 10px 18px;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            transition: .2s;
        }

        .tab.active {
            background: #222;
            color: #fff;
        }

        .content {
            display: none;
        }

        .content.active {
            display: block;
        }

        .list {
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .08);
        }

        .item {
            padding: 14px 16px;
            border-bottom: 1px solid #eee;
        }

        .item:last-child {
            border-bottom: none;
        }

        .row {
            display: flex;
            align-items: center;
        }

        .left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .name {
font-weight:400;
            font-size: 16px;
        }

        .icon {
            font-size: 15px;
        }

        .amount {
            margin-left: auto;
            font-size: 16px;
        }

        .memo {
            margin-top: 6px;
            font-size: 14px;
            color: #666;
            line-height: 1.5;
        }

        .total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            font-size: 16px;
            font-weight: bold;
            background: #f8f8f8;
            border-top: 2px solid #ddd;
        }

        .total strong {
            color: #1976d2;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <h1>📒 경조사 관리</h1>

    <div class="tabs"></div>

    <div class="contents"></div>

    <script>

        const eventList = [

            {
                type: '결혼',
                name: '홍길동',
                amount: 100000,
                memo: '회사 동료'
            },
            {
                type: '장례',
                name: '정현석/이슬기',
                amount: 300000
            },
            {
                type: '장례',
                name: '조치연',
                amount: 200000
            },
            {
                type: '장례',
                name: '채수만 상무이사',
                amount: 100000
            },
            {
                type: '장례',
                name: '최현주 그룹장',
                amount: 100000
            },
            {
                type: '장례',
                name: '김민석 이사',
                amount: 100000
            },
            {
                type: '장례',
                name: '이종환 수석',
                amount: 100000
            },
            {
                type: '장례',
                name: '이예진 수석',
                amount: 50000
            },
            {
                type: '장례',
                name: '이민우 수석',
                amount: 50000
            },
            {
                type: '장례',
                name: '조규연 책임',
                amount: 100000
            },
            {
                type: '장례',
                name: '허승일 대표이사',
                amount: 200000,
                visited: false,
            },
            {
                type: '장례',
                name: '안혁진 부사장',
                amount: 100000,
                visited: false,
            },
            {
                type: '장례',
                name: '김상경 전무이사',
                amount: 50000,
                visited: false,
            },
            {
                type: '장례',
                name: '이현민 상무이사',
                amount: 50000,
                visited: false,
            },
            {
                type: '장례',
                name: '임형준 실장',
                amount: 50000,
                visited: false,
            },
            {
                type: '장례',
                name: '김미진 수석',
                amount: 70000,
                visited: false,
            },
            {
                type: '장례',
                name: '허은정 수석',
                amount: 50000,
                visited: false,
            },
            {
                type: '장례',
                name: '윤혜진 수석',
                amount: 50000,
                visited: false,
            },
            {
                type: '장례',
                name: '최은선 수석',
                amount: 50000,
                visited: false,
            },
            {
                type: '장례',
                name: '정서경 수석',
                amount: 50000,
                visited: false,
            },
			{
                type: '장례',
                name: 'HCA',
                amount: 500000,
                visited: false,
            },
		 	{
                type: '장례',
                name: '한상준 대표이사',
                amount: 300000
            },
			{
                type: '장례',
                name: '남이사',
                amount: 200000
            },
			{
                type: '장례',
                name: '김우태(빵아저씨)',
                amount: 300000
            },
			{
                type: '장례',
                name: '신입1',
                amount: 100000
            },
			{
                type: '장례',
                name: '신입2',
                amount: 100000
            },
			{
                type: '장례',
                name: '신입3',
                amount: 100000
            },
            {
                type: '장례',
                name: '영천항운',
                amount: 100000,
                visited: false,
            },

        ];

        // 그룹화
        const groups = eventList.reduce((obj, item) => {

            (obj[item.type] ??= []).push(item);

            return obj;

        }, {});

        const tabs = document.querySelector(".tabs");
        const contents = document.querySelector(".contents");

        Object.entries(groups).forEach(([type, list], index) => {

            // 탭
            const button = document.createElement("button");
            button.className = `tab ${index === 0 ? "active" : ""}`;
            button.dataset.type = type;
            button.textContent = `${type} (${list.length})`;

            tabs.appendChild(button);

            // 합계
            const total = list.reduce((sum, item) => sum + item.amount, 0);

            // 내용
            const content = document.createElement("div");
            content.className = `content ${index === 0 ? "active" : ""}`;
            content.dataset.type = type;

            content.innerHTML = `
        <div class="list">

            ${list.map(item => {

                const visited = item.visited !== false;

                return `

                    <div class="item">
                        <div class="row">
                            <div class="left">
                                <span class="name">${item.name}</span>
                                ${visited ? '<span class="icon">✅</span>' : ''}
                            </div>
                            <span class="amount">${item.amount.toLocaleString()}원</span>
                        </div>
                        ${item.memo
                        ? `<div class="memo">비고 : ${item.memo}</div>`
                        : ''
                    }
                    </div>
                `;

            }).join("")}

            <div class="total">
                <span>합계</span>
                <strong>${total.toLocaleString()}원</strong>
            </div>

        </div>
    `;

            contents.appendChild(content);

        });

        // 탭
        tabs.addEventListener("click", e => {

            const tab = e.target.closest(".tab");

            if (!tab) return;

            document.querySelectorAll(".tab").forEach(el => {
                el.classList.remove("active");
            });

            document.querySelectorAll(".content").forEach(el => {
                el.classList.remove("active");
            });

            tab.classList.add("active");

            document.querySelector(`.content[data-type="${tab.dataset.type}"]`)
                .classList.add("active");

        });

    </script>

</body>

</html>
