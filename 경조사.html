```html
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경조사 관리</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"맑은 고딕",sans-serif;
}

body{
    max-width:700px;
    margin:40px auto;
    padding:20px;
    background:#f5f5f5;
    color:#333;
}

h1{
    margin-bottom:20px;
}

.tabs{
    display:flex;
    gap:10px;
    overflow-x:auto;
    margin-bottom:20px;
}

.tab{
    border:none;
    background:#e5e5e5;
    padding:10px 18px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    transition:.2s;
}

.tab.active{
    background:#222;
    color:#fff;
}

.content{
    display:none;
}

.content.active{
    display:block;
}

.list{
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.item{
    padding:14px 16px;
    border-bottom:1px solid #eee;
}

.item:last-child{
    border-bottom:none;
}

.row{
    display:flex;
    align-items:center;
}

.left{
    display:flex;
    align-items:center;
    gap:8px;
}

.name{
    font-weight:bold;
    font-size:16px;
}

.icon{
    font-size:15px;
}

.amount{
    margin-left:auto;
    font-weight:bold;
    font-size:15px;
}

.memo{
    margin-top:6px;
    font-size:14px;
    color:#666;
    line-height:1.5;
}

@media (max-width:600px){

    body{
        padding:15px;
    }

    .name{
        font-size:15px;
    }

    .amount{
        font-size:14px;
    }

}
</style>
</head>
<body>

<h1>📒 경조사 관리</h1>

<div class="tabs"></div>

<div class="contents"></div>

<script>

const eventList = [

    {
        type:'결혼',
        name:'홍길동',
        amount:100000,
        memo:'회사 동료'
    },

    {
        type:'결혼',
        name:'김철수',
        amount:50000,
        visited:false,
        memo:'친구'
    },

    {
        type:'결혼',
        name:'박지민',
        amount:70000
    },

    {
        type:'장례',
        name:'이영희',
        amount:100000
    },

    {
        type:'장례',
        name:'최민수',
        amount:50000,
        visited:false,
        memo:'출장으로 참석하지 못함'
    },

    {
        type:'돌잔치',
        name:'정수빈',
        amount:50000,
        memo:'조카'
    }

];

// 타입별 그룹화
const group = eventList.reduce((obj, item) => {

    (obj[item.type] ??= []).push(item);

    return obj;

}, {});

const tabs = document.querySelector('.tabs');
const contents = document.querySelector('.contents');

Object.keys(group).forEach((type, index) => {

    const tab = document.createElement('button');
    tab.className = `tab ${index === 0 ? 'active' : ''}`;
    tab.dataset.type = type;
    tab.textContent = `${type} (${group[type].length})`;

    tabs.appendChild(tab);

    const content = document.createElement('div');
    content.className = `content ${index === 0 ? 'active' : ''}`;
    content.dataset.type = type;

    let html = '<div class="list">';

    group[type].forEach(item => {

        const visited = item.visited !== false;

        html += `
            <div class="item">

                <div class="row">

                    <div class="left">
                        <div class="name">${item.name}</div>

                        ${
                            visited
                            ? '<span class="icon" title="방문">✅</span>'
                            : ''
                        }
                    </div>

                    <div class="amount">
                        ${item.amount.toLocaleString()}원
                    </div>

                </div>

                ${
                    item.memo
                    ? `<div class="memo">비고 : ${item.memo}</div>`
                    : ''
                }

            </div>
        `;

    });

    html += '</div>';

    content.innerHTML = html;

    contents.appendChild(content);

});

tabs.addEventListener('click', e => {

    const tab = e.target.closest('.tab');

    if (!tab) return;

    document.querySelectorAll('.tab').forEach(el => {
        el.classList.remove('active');
    });

    document.querySelectorAll('.content').forEach(el => {
        el.classList.remove('active');
    });

    tab.classList.add('active');

    document
        .querySelector(`.content[data-type="${tab.dataset.type}"]`)
        .classList.add('active');

});

</script>

</body>
</html>
```
