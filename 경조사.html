<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경조사 관리</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"맑은 고딕",sans-serif;
}

body{
    max-width:800px;
    margin:40px auto;
    padding:20px;
    background:#f7f7f7;
    color:#333;
}

h1{
    margin-bottom:20px;
}

.tabs{
    display:flex;
    gap:10px;
    margin-bottom:20px;
    overflow-x:auto;
}

.tab{
    border:none;
    background:#e5e5e5;
    padding:10px 18px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    transition:.2s;
}

.tab.active{
    background:#222;
    color:#fff;
}

.content{
    display:none;
}

.content.active{
    display:block;
}

.list{
    background:#fff;
    border-radius:8px;
    overflow:hidden;
}

.item{
    padding:14px 0;
    border-bottom:1px solid #eee;
}

.item:last-child{
    border-bottom:none;
}

.row{
    display:flex;
    align-items:center;
    gap:20px;
}

.name{
    width:120px;
    font-weight:bold;
}

.amount{
    width:120px;
}

.visit{
    width:80px;
    color:#0a8f4d;
    font-weight:bold;
}

.not-visit{
    width:80px;
    color:#d32f2f;
    font-weight:bold;
}

.memo{
    margin-top:6px;
    margin-left:120px;
    color:#666;
    font-size:14px;
}

@media (max-width:600px){

    .row{
        gap:10px;
        font-size:14px;
    }

    .name{
        width:90px;
    }

    .amount{
        width:90px;
    }

    .visit,
    .not-visit{
        width:60px;
    }

    .memo{
        margin-left:90px;
    }

}
</style>
</head>
<body>

<h1>📒 경조사 관리</h1>

<div class="tabs"></div>

<div class="contents"></div>

<script>

const eventList = [

    {
        type:'결혼',
        name:'홍길동',
        amount:100000,
        memo:'회사 동료'
    },

    {
        type:'결혼',
        name:'김철수',
        amount:50000,
        visited:false,
        memo:'친구'
    },

    {
        type:'결혼',
        name:'박지민',
        amount:70000
    },

    {
        type:'장례',
        name:'이영희',
        amount:100000
    },

    {
        type:'장례',
        name:'최민수',
        amount:50000,
        visited:false,
        memo:'출장으로 참석 못함'
    },

    {
        type:'돌잔치',
        name:'정수빈',
        amount:50000,
        memo:'조카'
    }

];

// 타입별 그룹화
const group = eventList.reduce((obj,item)=>{

    if(!obj[item.type]){
        obj[item.type]=[];
    }

    obj[item.type].push(item);

    return obj;

},{});

const tabs=document.querySelector('.tabs');
const contents=document.querySelector('.contents');

Object.keys(group).forEach((type,index)=>{

    // 탭 생성
    const button=document.createElement('button');
    button.className=`tab ${index===0?'active':''}`;
    button.dataset.type=type;
    button.textContent=`${type} (${group[type].length})`;

    tabs.appendChild(button);

    // 내용 생성
    const content=document.createElement('div');
    content.className=`content ${index===0?'active':''}`;
    content.dataset.type=type;

    let html='<div class="list">';

    group[type].forEach(item=>{

        const visited=item.visited!==false;

        html+=`
            <div class="item">

                <div class="row">

                    <div class="name">
                        ${item.name}
                    </div>

                    <div class="amount">
                        ${item.amount.toLocaleString()}원
                    </div>

                    <div class="${visited?'visit':'not-visit'}">
                        ${visited?'방문':'미방문'}
                    </div>

                </div>

                ${
                    item.memo
                    ? `<div class="memo">비고 : ${item.memo}</div>`
                    : ''
                }

            </div>
        `;

    });

    html+='</div>';

    content.innerHTML=html;

    contents.appendChild(content);

});

// 탭 이벤트
tabs.addEventListener('click',e=>{

    const tab=e.target.closest('.tab');

    if(!tab) return;

    document.querySelectorAll('.tab').forEach(el=>{
        el.classList.remove('active');
    });

    document.querySelectorAll('.content').forEach(el=>{
        el.classList.remove('active');
    });

    tab.classList.add('active');

    document
        .querySelector(`.content[data-type="${tab.dataset.type}"]`)
        .classList.add('active');

});

</script>

</body>
</html>
